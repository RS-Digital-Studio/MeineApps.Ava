name: ArcaneKingdom (Unity)

on:
  push:
    branches: [master, main]
    paths:
      - "src/Apps/ArcaneKingdom/Unity/**"
      - ".github/workflows/arcanekingdom-unity.yml"
  pull_request:
    branches: [master, main]
    paths:
      - "src/Apps/ArcaneKingdom/Unity/**"
      - ".github/workflows/arcanekingdom-unity.yml"
  workflow_dispatch:
    inputs:
      build_target:
        description: "Build-Target"
        required: true
        default: "Android"
        type: choice
        options:
          - Android
          - StandaloneWindows64

env:
  UNITY_PROJECT_PATH: src/Apps/ArcaneKingdom/Unity
  UNITY_VERSION: 2022.3.50f1

jobs:
  test-domain:
    name: Domain EditMode-Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/cache@v4
        with:
          path: ${{ env.UNITY_PROJECT_PATH }}/Library
          key: Library-Test-${{ hashFiles('src/Apps/ArcaneKingdom/Unity/Assets/**', 'src/Apps/ArcaneKingdom/Unity/Packages/**', 'src/Apps/ArcaneKingdom/Unity/ProjectSettings/**') }}
          restore-keys: |
            Library-Test-
            Library-

      - name: Run EditMode Tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: ${{ env.UNITY_PROJECT_PATH }}
          unityVersion: ${{ env.UNITY_VERSION }}
          testMode: editmode
          artifactsPath: test-results
          githubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: editmode-test-results
          path: test-results

  build-android:
    name: Android AAB Build
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: test-domain
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android/sdk/ndk /opt/ghc /opt/hostedtoolcache/CodeQL
          docker rmi $(docker image ls -aq) 2>/dev/null || true
          df -h

      - uses: actions/cache@v4
        with:
          path: ${{ env.UNITY_PROJECT_PATH }}/Library
          key: Library-Android-${{ hashFiles('src/Apps/ArcaneKingdom/Unity/Assets/**', 'src/Apps/ArcaneKingdom/Unity/Packages/**', 'src/Apps/ArcaneKingdom/Unity/ProjectSettings/**') }}
          restore-keys: |
            Library-Android-
            Library-

      - name: Build Android AAB
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASS }}
          ANDROID_KEY_ALIAS_NAME: ${{ secrets.ANDROID_KEY_ALIAS_NAME }}
          ANDROID_KEY_ALIAS_PASS: ${{ secrets.ANDROID_KEY_ALIAS_PASS }}
        with:
          projectPath: ${{ env.UNITY_PROJECT_PATH }}
          unityVersion: ${{ env.UNITY_VERSION }}
          targetPlatform: Android
          androidExportType: androidAppBundle
          buildName: ArcaneKingdom
          allowDirtyBuild: true
          androidKeystoreName: meineapps.keystore
          androidKeystoreBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          androidKeystorePass: ${{ secrets.ANDROID_KEYSTORE_PASS }}
          androidKeyaliasName: ${{ secrets.ANDROID_KEY_ALIAS_NAME }}
          androidKeyaliasPass: ${{ secrets.ANDROID_KEY_ALIAS_PASS }}

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: ArcaneKingdom-Android-AAB
          path: build/Android
          retention-days: 30
