name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  build-shared:
    name: Build Shared + Desktop (Solution-Level)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            10.0.x
          dotnet-quality: preview

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      # Solution-Build kann auf Linux nicht alle Android-Projekte bauen.
      # Wir bauen die Shared- und Desktop-Projekte sowie die Libraries in einem Sweep.
      - name: Restore Libraries + Tests
        run: |
          dotnet restore src/Libraries/MeineApps.CalcLib/MeineApps.CalcLib.csproj
          dotnet restore src/Libraries/MeineApps.Core.Ava/MeineApps.Core.Ava.csproj
          dotnet restore src/UI/MeineApps.UI/MeineApps.UI.csproj

      - name: Build HandwerkerImperium.Shared
        run: dotnet build src/Apps/HandwerkerImperium/HandwerkerImperium.Shared/HandwerkerImperium.Shared.csproj -c Release --nologo /p:TreatWarningsAsErrors=false

      - name: Build HandwerkerImperium.Desktop
        run: dotnet build src/Apps/HandwerkerImperium/HandwerkerImperium.Desktop/HandwerkerImperium.Desktop.csproj -c Release --nologo /p:TreatWarningsAsErrors=false

      - name: Build MeineApps.Core.Ava
        run: dotnet build src/Libraries/MeineApps.Core.Ava/MeineApps.Core.Ava.csproj -c Release --nologo

  test:
    name: HandwerkerImperium Unit-Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            10.0.x
          dotnet-quality: preview

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore Test-Projekt
        run: dotnet restore tests/HandwerkerImperium.Tests/HandwerkerImperium.Tests.csproj

      - name: Build Test-Projekt
        run: dotnet build tests/HandwerkerImperium.Tests/HandwerkerImperium.Tests.csproj -c Release --no-restore /p:TreatWarningsAsErrors=false

      - name: Test mit Coverage
        run: |
          dotnet test tests/HandwerkerImperium.Tests/HandwerkerImperium.Tests.csproj \
            -c Release --no-build --logger trx --logger "console;verbosity=normal" \
            --collect:"XPlat Code Coverage" \
            --settings tests/HandwerkerImperium.Tests/coverlet.runsettings \
            --results-directory ./TestResults

      # AAA-Audit P2: ReportGenerator + Coverage-Schwelle 60% auf Domain-Layer.
      # Audit-Ziel war 80% — wir starten bei 60%, ziehen schrittweise hoch.
      - name: Install ReportGenerator
        run: dotnet tool install -g dotnet-reportgenerator-globaltool

      - name: Coverage-Report generieren
        run: |
          reportgenerator \
            -reports:'TestResults/**/coverage.cobertura.xml' \
            -targetdir:'TestResults/coverage-report' \
            -reporttypes:'Html;Cobertura;TextSummary;MarkdownSummaryGithub'
          cat TestResults/coverage-report/Summary.txt || true

      - name: Coverage-Schwelle (Soft-Gate, derzeit nur Warnung)
        run: |
          # Extrahiert die Line-Coverage und vergleicht mit Schwelle 60.
          LINE_COV=$(grep -oP 'Line coverage:\s*\K[0-9.]+' TestResults/coverage-report/Summary.txt | head -1)
          echo "Line-Coverage: ${LINE_COV}%"
          THRESHOLD=60
          if (( $(echo "${LINE_COV} < ${THRESHOLD}" | bc -l) )); then
            echo "::warning::Coverage ${LINE_COV}% unter ${THRESHOLD}% Schwelle"
          fi

      - name: PR-Coverage-Comment
        if: github.event_name == 'pull_request'
        run: |
          if [ -f TestResults/coverage-report/SummaryGithub.md ]; then
            cat TestResults/coverage-report/SummaryGithub.md >> $GITHUB_STEP_SUMMARY
          fi

      - name: Test-Results Artefakt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/**/*
          retention-days: 7

  firebase-rules-diff:
    name: Firebase Rules Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      # Schneller JSON-Schema-Check auf database.rules.json — verhindert Deploy
      # mit kaputten Rules. Fuer einen echten Diff gegen Production brauchen wir
      # FIREBASE_TOKEN als Secret (siehe README CI-Setup).
      - name: Validate JSON-Syntax
        run: |
          node -e "JSON.parse(require('fs').readFileSync('database.rules.json','utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('database.rules.bomberblast.json','utf8'))"

      - name: Suche nach offenem Read/Write
        run: |
          # Heuristik: '.read': true oder '.write': true ohne Bedingung sind Cheating-Vektoren.
          # Erlaubt: in Service-Accounts oder unter authentifizierter Hierarchie.
          if grep -nE '"\.(read|write)"\s*:\s*"true"' database.rules.json database.rules.bomberblast.json; then
            echo "::warning::Offenes Read/Write gefunden — bitte pruefen"
          fi
